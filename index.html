<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCC Legend 1977 - Sistema de Tickets</title>
    <!-- Librería para convertir HTML a Imagen -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --p: #003366; --s: #f39c12; --f: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--f); margin: 0; padding-bottom: 20px; }
        .header { background: var(--p); color: white; padding: 20px; text-align: center; }
        .contenedor { padding: 20px; max-width: 500px; margin: auto; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: var(--p); color: white; font-weight: bold; border: none; cursor: pointer; }
        .btn-add { background: var(--s); flex: 0.3; }
        .lista-temp { background: white; padding: 15px; border-radius: 8px; border: 1px dashed var(--p); margin: 15px 0; }
        .numero-tag { background: #ebf5ff; border: 1px solid var(--p); padding: 2px 8px; border-radius: 4px; margin: 2px; display: inline-block; font-weight: bold; }

        /* Estilo del Ticket (Invisible en la pantalla principal) */
        #ticket-area { 
            position: absolute; left: -9999px; top: 0; /* Lo sacamos de la vista */
            width: 350px; background: white; text-align: center; font-family: 'Courier New', Courier, monospace;
        }
        .t-card { border: 2px solid #000; padding: 20px; background: white; }
        .t-header { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 10px; }
        .t-body { padding: 10px 0; }
        .t-footer { border-top: 2px dashed #000; padding-top: 10px; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 20px; font-weight: bold;">CCC LEGEND 1977</div>
    <div style="font-size: 12px;">CONTROL DE VENTAS</div>
</div>

<div class="contenedor">
    <input type="text" id="cliente" placeholder="Nombre del Cliente">
    
    <div style="display: flex; gap: 10px;">
        <input type="number" id="numero" placeholder="00-99" min="0" max="99" 
               oninput="if(this.value.length > 2) this.value = this.value.slice(0, 2);">
        <button class="btn-add" onclick="agregarALista()">+</button>
    </div>

    <div class="lista-temp">
        <strong>Números en este ticket:</strong>
        <div id="display-lista" style="margin-top: 8px;">(Vacio)</div>
        <div id="total-temp" style="margin-top: 10px; color: var(--p); font-weight: bold; font-size: 18px;">Total: $0.00</div>
    </div>

    <button onclick="generarYCompartir()" style="background: #27ae60; padding: 15px;">
        ✅ GENERAR Y COMPARTIR TICKET
    </button>
</div>

<!-- EL TICKET OCULTO QUE SE CONVERTIRÁ EN IMAGEN -->
<div id="ticket-area">
    <div class="t-card">
        <div class="t-header">
            <h2 style="margin: 0;">CCC LEGEND 1977</h2>
            <p style="margin: 5px 0;">*** TICKET DE VENTA ***</p>
        </div>
        <div class="t-body">
            <p><strong>CLIENTE:</strong> <span id="t-cliente"></span></p>
            <p><strong>NÚMEROS:</strong></p>
            <div id="t-numeros" style="font-size: 20px; letter-spacing: 2px;"></div>
            <h1 id="t-total" style="margin: 15px 0;"></h1>
            <p id="t-fecha" style="font-size: 12px;"></p>
            <p style="font-size: 18px; font-weight: bold;">¡BUENA SUERTE! 🍀</p>
        </div>
        <div class="t-footer">
            Favor revisar su tiquete. No se aceptan reclamos después de retirarse. Gracias por su compra.
        </div>
    </div>
</div>

<script>
    let numerosVenta = [];
    const precioPorBoleto = 0.20;

    function agregarALista() {
        const input = document.getElementById('numero');
        const num = input.value;
        if(num === "" || num < 0 || num > 99) return alert("Número inválido");
        
        numerosVenta.push(num.padStart(2, '0'));
        actualizarUI();
        input.value = "";
        input.focus();
    }

    function actualizarUI() {
        document.getElementById('display-lista').innerHTML = numerosVenta.map(n => `<span class="numero-tag">${n}</span>`).join(' ');
        document.getElementById('total-temp').innerText = `Total: $${(numerosVenta.length * precioPorBoleto).toFixed(2)}`;
    }

    async function generarYCompartir() {
        if(numerosVenta.length === 0) return alert("Agrega números primero");

        const cliente = document.getElementById('cliente').value || "CLIENTE GENERAL";
        const ahora = new Date();
        const fechaStr = ahora.toLocaleString();

        // Llenar datos ocultos
        document.getElementById('t-cliente').innerText = cliente.toUpperCase();
        document.getElementById('t-numeros').innerText = numerosVenta.join(" - ");
        document.getElementById('t-total').innerText = `TOTAL:$${(numerosVenta.length * precioPorBoleto).toFixed(2)}`;
        document.getElementById('t-fecha').innerText = fechaStr;

        // Convertir el ticket oculto a imagen
        const elemento = document.getElementById('ticket-area');
        const canvas = await html2canvas(elemento, { scale: 2 });
        
        canvas.toBlob(async (blob) => {
            const file = new File([blob], 'ticket.png', { type: 'image/png' });
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'Ticket CCC Legend',
                        text: 'Aquí tiene su tiquete de compra.'
                    });
                    // Limpiar después de compartir
                    numerosVenta = [];
                    document.getElementById('cliente').value = "";
                    actualizarUI();
                } catch (err) {
                    console.log("Error al compartir:", err);
                }
            } else {
                alert("Tu navegador no soporta compartir archivos. Por favor, toma una captura manual.");
            }
        });
    }
</script>

</body>
</html>
