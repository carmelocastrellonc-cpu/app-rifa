<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket CCC Legend 1977</title>
    
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .contenedor-app {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            background-color: #f39c12;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #e67e22; }

        .lista-temp {
            text-align: left;
            margin-top: 15px;
            margin-bottom: 15px;
            border-top: 2px solid #003366;
            padding-top: 10px;
        }

        
#ticket-visual {
            display: none; 
            width: 350px;
            background-color: white;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            position: relative;
        }
        .header-ticket { text-align: center; }
        .logo-ticket { max-width: 100%; height: auto; }
        .fecha-ticket { font-size: 12px; color: gray; }
        .cuerpo-ticket table {
            width: 100%;
            margin-top: 15px;
            margin-bottom: 15px;
            border-collapse: collapse;
        }
        .cuerpo-ticket th, .cuerpo-ticket td {
            text-align: center;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        .total-ticket {
            background-color: #001f3f; 
            color: white;
            font-weight: bold;
            font-size: 18px;
            padding: 15px;
            border-radius: 10px; 
            text-align: center;
        }
        .boton-generar {
            background-color: #27ae60;
        }
        .boton-generar:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

    <div class="contenedor-app">
        <input type="text" id="cliente" placeholder="Nombre del Cliente">
        <div style="display: flex; gap: 10px;">
            <input type="number" id="numero" placeholder="Núm (00-99)" min="0" max="99">
            <input type="number" id="monto" placeholder="Monto $">
            <button onclick="agregarALista()" style="width: auto; background-color: #f39c12;">+</button>
        </div>

        <div class="lista-temp" id="lista-temp">
            <div>(Lista vacía)</div>
        </div>
        <hr>
        <div id="total-previa" style="font-weight: bold; color: #001f3f; margin-bottom: 15px;">Total: $ 0.00</div>

        <button class="boton-generar" onclick="prepararYCompartir()">✅ GENERAR Y COMPARTIR TICKET</button>
    </div>

    
<div id="ticket-visual">
        <div class="header-ticket">
            
<img src="logo.png" alt="Logo CCC Legend 1977" class="logo-ticket">
            <div class="fecha-ticket" id="fecha-ticket"></div>
        </div>
        <div class="cuerpo-ticket">
            <div style="font-size: 14px; text-align: left; padding: 5px;">Cliente: <span id="nombre-cliente-ticket" style="font-weight: bold;"></span></div>
            <table id="tabla-ticket">
                <thead>
                    <tr>
                        <th>Número</th>
                        <th>Monto</th>
                    </tr>
                </thead>
                <tbody id="lista-ventas-ticket">
                </tbody>
            </table>
        </div>
        
<div class="total-ticket" id="total-ticket">
            Total: $ 0.00
        </div>
    </div>

    <script>
        let ventas = [];
        let granTotal = 0;

        function agregarALista() {
            const num = document.getElementById("numero").value;
            const mont = document.getElementById("monto").value;
            const clienteVal = document.getElementById("cliente").value;

            if (num && mont && num.length === 2) {
                const montoFloat = parseFloat(mont);
                ventas.push({ numero: num, monto: montoFloat });
                granTotal += montoFloat;

                actualizarInterfaz();
                
            } else {
                alert("Por favor, ingresa un número de 2 dígitos y un monto.");
            }
        }

        function actualizarInterfaz() {
            const lista = document.getElementById("lista-temp");
            const totalPrevia = document.getElementById("total-previa");
            
            if (ventas.length === 0) {
                lista.innerHTML = "<div>(Lista vacía)</div>";
            } else {
                lista.innerHTML = ventas.map(v => `<div>#${v.numero} ——— $ ${v.monto.toFixed(2)}</div>`).join("");
            }
            totalPrevia.innerText = `Total: $ ${granTotal.toFixed(2)}`;
        }

        function prepararYCompartir() {
            const clienteVal = document.getElementById("cliente").value;

            if (ventas.length === 0 || !clienteVal) {
                alert("Primero agrega números y el nombre del cliente.");
                return;
            }

            
            document.getElementById("nombre-cliente-ticket").innerText = clienteVal;
            const listaTicket = document.getElementById("lista-ventas-ticket");
            listaTicket.innerHTML = ventas.map(v => `<tr><td>#${v.numero}</td><td>$ ${v.monto.toFixed(2)}</td></tr>`).join("");
            document.getElementById("total-ticket").innerText = `Total: $ ${granTotal.toFixed(2)}`;
            const d = new Date();
            document.getElementById("fecha-ticket").innerText = d.toLocaleDateString() + ' ' + d.toLocaleTimeString();

            
            const ticketDiv = document.getElementById("ticket-visual");
            ticketDiv.style.display = "block";

            
            html2canvas(ticketDiv, {
                useCORS: true, 
                allowTaint: true 
            }).then(canvas => {
                canvas.toBlob(blob => {
                    if (navigator.share) {
                        const file = new File([blob], 'ticket.png', { type: 'image/png' });
                        navigator.share({
                            files: [file],
                            title: 'Ticket de Venta CCC Legend 1977',
                            text: 'Aquí tienes tu ticket de venta.'
                        }).then(() => {
                            console.log('Compartido con éxito');
                            limpiarTodo(); 
                        }).catch(err => {
                            console.error('Error al compartir', err);
                            alert("No se pudo compartir automáticamente. Puedes descargar la imagen manualmente.");
                            
                            const link = document.createElement('a');
                            link.href = canvas.toDataURL();
                            link.download = 'ticket.png';
                            link.click();
                            limpiarTodo();
                        });
                    } else {
                        alert("Tu navegador no soporta la función de compartir archivos.");
                        
                        const link = document.createElement('a');
                        link.href = canvas.toDataURL();
                        link.download = 'ticket.png';
                        link.click();
                        limpiarTodo();
                    }
                    ticketDiv.style.display = "none"; 
                });
            });
        }

        function limpiarTodo() {
            ventas = [];
            granTotal = 0;
            document.getElementById("cliente").value = "";
            document.getElementById("numero").value = "";
            document.getElementById("monto").value = "";
            actualizarInterfaz();
        }
    </script>
</body>
</html>
